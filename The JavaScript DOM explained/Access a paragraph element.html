<!DOCTYPE html>
<html>

<head>
    <title>DOM Example</title>
</head>

<body>
    <h1 id="title">Rakib</h1>
    <button onclick="changeText()">Click Me</button>

    <script>
        function changeText() {
            document.getElementById("title").innerHTML = "Md mhamudul islam Rakib";
        }
    </script>
</body>

</html>
