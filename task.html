<div class="contact-form">
    <h2>Contact Us Today!</h2>

    <form>

        <div>
            <label>First Name</label>
            <input type="text" placeholder="First Name">
        </div>

<br>
        <div>
            <label>Last Name</label>
            <input type="text" placeholder="Last Name">
        </div>
<br>

        <div>
            <label>E-Mail</label>
            <input type="email" placeholder="E-Mail Address">
        </div>
<br>

        <div>
            <label>Phone #</label>
            <input type="tel" placeholder="(845)555-1212">
        </div>
<br>

        <div>
            <label>Address</label>
            <input type="text" placeholder="Address">
        </div>
<br>

        <div>
            <label>City</label>
            <input type="text" placeholder="city">
        </div>
<br>

        <div>
            <label>State</label>
            <select>
                <option>Please select state</option>
            </select>
        </div>
<br>

        <div>
            <label>Zip Code</label>
            <input type="text" placeholder="Zip Code">
        </div>
<br>

        <div>
            <label>Website or domain name</label>
            <input type="url" placeholder="Website or domain name">
        </div>
<br>

        <div>
            <label>Do you have hosting?</label>
            <label><input type="radio" name="hosting"> Yes</label>
            
            <label><input type="radio" name="hosting"> No</label>
        </div>
<br>

        <div>
            <label>Project Description</label>
            <textarea placeholder="Project Description"></textarea>
        </div>
<br>

        <button type="submit">Send</button>

    </form>
</div>
