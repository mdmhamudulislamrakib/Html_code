<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Layout</title>
    <style>
        * { margin: 0; padding: 0; }
        body { font-family: Arial; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #333; color: white; padding: 20px; }
        .container { display: flex; flex: 1; }
        sidebar { width: 25%; background: #f0f0f0; padding: 20px; }
        main { width: 75%; padding: 20px; }
        footer { background: #333; color: white; padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <header>
        <h1>Flexbox Layout</h1>
    </header>

    <div class="container">
        <sidebar>
            <h3>Sidebar</h3>
            <p>Link 1</p>
            <p>Link 2</p>
        </sidebar>

        <main>
            <h2>Main Content</h2>
            <p>This layout uses CSS flexbox.</p>
        </main>
    </div>

    <footer>
        <p>&copy; 2024</p>
    </footer>
</body>
</html>
