<html>
<head>

    <style>
        body { margin: 0; font-family: Arial; }
        #container { display: flex; }
        #sidebar { width: 25%; background: #f0f0f0; padding: 20px; }
        #content { width: 75%; padding: 20px; }
    </style>
</head>
<body>
    <div id="container">
        <div id="sidebar">
            <h3>Sidebar</h3>
            <p>Rakib</p>
            <p>Borsha</p>
            <p>jemi</p>
        </div>
        <div id="content">
            <h2>Main Content</h2>
            <p>This is the main content area of the two-column layout.</p>
        </div>
    </div>
</body>
</html>
