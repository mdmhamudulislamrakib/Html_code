<!DOCTYPE html>
<html>
<head>
    <title>Complete Webpage Layout</title>
    <style>
        * { margin: 0; padding: 0; }
        body { font-family: Arial; }
        header { background: #333; color: white; padding: 20px; text-align: center; }
        nav { background: #666; padding: 10px; }
        nav a { color: white; margin: 10px; text-decoration: none; }
        .container { display: flex; }
        sidebar { width: 25%; background: #f0f0f0; padding: 20px; }
        main { width: 75%; padding: 20px; }
        footer { background: #333; color: white; padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <header>
        <h1>My Website</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <div class="container">
        <sidebar>
            <h3>Sidebar</h3>
            <p>Rakib</p>
            <p>Shakib</p>
            <p>Jamal</p>
        </sidebar>

        <main>
            <h2>Main Content</h2>
            <p>This is the main content area of the webpage.</p>
            <p>Add your content here.</p>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 My Website. All rights reserved.</p>
    </footer>
</body>
</html>
