<!DOCTYPE html>
<html>
<head>
	<title>Table Layout Page</title>
</head>
<body>
	<table width="100%" border="1" cellspacing="0" cellpadding="10">
		<tr>
			<td colspan="2" align="center"><h2>Website Header</h2></td>
		</tr>
		<tr>
			<td width="25%" valign="top">
				<h3>Sidebar</h3>
				<p>Link 1</p>
				<p>Link 2</p>
				<p>Link 3</p>
			</td>
			<td valign="top">
				<h3>Main Content</h3>
				<p>This is the main content area of the page layout.</p>
				<p>Add your text, images, or other content here.</p>
			</td>
		</tr>
		<tr>
			<td colspan="2" align="center">Footer</td>
		</tr>
	</table>
</body>
</html>
